    <BODY><div class="head">
         <h1>Welcome to VELMURUGAN furnitures Please Login</h1>
    </div>
        <div class="loooo">
            <div class="logg">
            

        
<form id="loginForm" onsubmit="login(event)">
  <input id="lname" placeholder="Username" required><br>
  <input id="lpass" type="password" placeholder="Password" required><br>
  <button type="submit">Login</button>
</form>
  <span>new user</span><a href="reg.html"><button >register</button></a>
        <a href="home.html"><button >guest</button></a><a href="admin.html"><button >Admin</button></a>
        </div></div>

<script>
function login(e){
  e.preventDefault();
  let savedUser = JSON.parse(localStorage.getItem("user"));

  if(lname.value === savedUser.name && lpass.value === savedUser.pass){
    localStorage.setItem("loginUser", JSON.stringify(savedUser));
    alert("Login success");
    location.href="home.html";
  }
  else{
    alert("Invalid login");
  }
}
</script>
